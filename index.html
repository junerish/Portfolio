<style>
/* ── Reset ───────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#fff;color:#111110;font-family:"Public Sans","Noto Sans KR","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6;}
::selection{background:#6750A4;color:#fff;}
a{color:inherit;text-decoration:none;}
button{background:none;border:none;cursor:pointer;font:inherit;color:inherit;padding:0;}
ul,ol{list-style:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#f5f4f2;}
::-webkit-scrollbar-thumb{background:#d8d7d4;border-radius:2px;}
/* Hidden scroll area — scroll works, scrollbar invisible */
.scroll-hidden{-ms-overflow-style:none;scrollbar-width:none;}
.scroll-hidden::-webkit-scrollbar{display:none;width:0;height:0;}

/* ── Typography (from Figma guide — Public Sans) ────────────── */
.text-h1{font-size:46px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:68px;letter-spacing:0;}
.text-h2{font-size:38px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:56px;letter-spacing:0;}
.text-h3{font-size:28px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:42px;letter-spacing:0;}
.text-h4{font-size:24px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:38px;letter-spacing:0;}
.text-h5{font-size:18px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:28px;letter-spacing:0;}
.text-h6{font-size:15px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:22px;letter-spacing:0;}
.text-body-1{font-size:15px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:400;line-height:26px;letter-spacing:0;}
.text-body-1-500{font-size:15px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:26px;letter-spacing:0;}
.text-body-2{font-size:13px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:400;line-height:22px;letter-spacing:0;}
.text-body-2-500{font-size:13px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:20px;letter-spacing:0;}
.text-overline{font-size:12px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:400;line-height:14px;letter-spacing:0.8px;text-transform:uppercase;}
.text-caption{font-size:13px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:400;line-height:20px;letter-spacing:0.4px;}
.text-mini-upper{font-size:10px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:400;line-height:normal;letter-spacing:0.8px;text-transform:uppercase;}
.text-chip{font-size:13px;font-family:"Public Sans","Noto Sans KR",sans-serif;font-weight:500;line-height:20px;}

/* ── Design tokens ───────────────────────────────────────────── */
/* bg:#fff  surf:#F8F7F5  border:#E8E7E4  text1:#111110  text2:#595856  text3:#ABABAB  accent:#6750A4 */

/* ── Layout helpers ──────────────────────────────────────────── */
.page-wrap{max-width:1200px;margin:0 auto;padding:0 48px;}

/* ── Tablet (≤900px) ────────────────────────────────────────── */
@media(max-width:900px){
  .page-wrap{padding:0 28px;}
  .grid-3{grid-template-columns:1fr 1fr!important;}
  .text-h1{font-size:32px!important;line-height:46px!important;}
  .text-h2{font-size:26px!important;line-height:38px!important;}
  .nav-links{display:none!important;}
  .hamburger{display:flex!important;}
}

/* ── Mobile (≤640px) ─────────────────────────────────────────── */
@media(max-width:640px){
  .page-wrap{padding:0 20px!important;}
  .grid-2{grid-template-columns:1fr!important;}
  .grid-3{grid-template-columns:1fr!important;}
  .text-h1{font-size:24px!important;line-height:34px!important;}
  .text-h2{font-size:20px!important;line-height:30px!important;}
  .text-h3{font-size:18px!important;line-height:28px!important;}
  .text-h4{font-size:16px!important;line-height:24px!important;}
  .text-h5{font-size:15px!important;line-height:22px!important;}
}

/* ── Hamburger (hidden on desktop) ──────────────────────────── */
.hamburger{display:none;background:none;border:none;cursor:pointer;width:40px;height:40px;align-items:center;justify-content:center;flex-shrink:0;}

/* ── Mobile component overrides ──────────────────────────────── */
@media(max-width:640px){
  .profile-row{flex-direction:column!important;align-items:flex-start!important;gap:16px!important;}
  .career-timeline{padding-left:32px!important;}
  .career-dot{left:-36px!important;top:8px!important;}
  .career-grid{grid-template-columns:1fr!important;gap:4px!important;}
  .section-pad-lg{padding:48px 20px!important;}
  .portfolio-gap{gap:24px!important;}
  .detail-grid{grid-template-columns:1fr!important;gap:24px!important;}
  .skill-cols{grid-template-columns:1fr!important;gap:32px!important;}
  .comp-grid{grid-template-columns:1fr!important;gap:10px!important;}
  .footer-row{flex-direction:column!important;gap:8px!important;}
  .contact-grid{grid-template-columns:1fr!important;gap:40px!important;}
  .timeline-meta{padding-top:0!important;}
  /* Section & About spacing */
  .mob-section{padding-top:32px!important;padding-bottom:32px!important;}
  .profile-photo{width:72px!important;height:72px!important;}
  .profile-row{margin-bottom:16px!important;}
  .intro-divider{padding-top:14px!important;}
  .comp-grid{gap:8px!important;}
  .skill-cols{gap:28px!important;}
}

       uiux:"메인 결제 플로우를 3단계(금액선택 → 결제수단 → 확인)로 단순화. 화면별 Before & After 비교 와이어프레임 23개 작성. 고령 사용자 기준 최소 글자 크기 18px 이상, 터치 영역 44px 이상 기준 수립. Figma로 설계 후 3회 UT 진행 및 반영."
     },
     results:{
       quantitative:["결제 이탈률 41% → 18% (−57% 개선)","CS 문의 월평균 320건 → 89건 (−72%)","일 평균 결제 완료 시간 4.8분 → 2.1분"],
       qualitative:["고령층 친화 UX 기준이 내부 가이드라인으로 표준화","15개 지자체에 동일 설계 적용·확장","백오피스 운영 효율 향상 (어드민 처리 시간 단축)"]
     },
     lesson:"정책 설계를 UI보다 먼저 해야 한다는 교훈을 얻었습니다. 지자체별 예외 케이스를 UI 단계에서 발견하면 설계를 처음부터 다시 해야 합니다. 실 사용자 인터뷰 5건만으로도 핵심 문제의 80%를 발견할 수 있었고, 이후 모든 프로젝트에서 UI 착수 전 최소 5건의 인터뷰를 의무화하고 있습니다."},
    {id:"p2",title:"금융 투자 플랫폼 신규 서비스 기획",service:"금융 투자 서비스 플랫폼 (에이디에프랩스)",
     category:"Service Planning · UI/UX Design",period:"2022.08 — 2023.04",
     contribution:"기획 기여도 100% · 기획 PL (총 6명)",
     role:["IA 설계","서비스 정책 수립","UI/UX 화면설계서 작성","QA 관리"],
     images:["서비스 전체 IA 구조도 및 메뉴 트리","투자 상품 탐색 플로우 — 와이어프레임","계좌 연결 및 인증 정책 플로우차트","최종 UI 설계서 주요 화면"],
     background:"기존 서비스는 투자 상품 탐색부터 구매까지의 플로우가 분산되어 있어 첫 투자 완료율이 낮았습니다. 신규 사용자 온보딩 경험 개선과 함께 금융상품 탐색 → 투자 → 포트폴리오 관리 전 과정을 하나의 서비스로 통합하는 것이 목표였습니다.",
     problem:"사용자 세션 데이터 분석 결과, 신규 가입 후 첫 투자 완료까지의 이탈이 '계좌 연결' 단계에서 집중 발생(전체 이탈의 54%)했습니다. 연결 실패 이유가 명확히 안내되지 않고, 오류 후 처음부터 다시 시작해야 하는 구조가 핵심 문제였습니다.",
     process:{
       hypothesis:"계좌 연결 오류 시 진행 상태를 보존하고 오류 원인을 명확히 안내하면, 계좌 연결 완료율이 최소 40% 이상 상승할 것으로 가설을 수립했습니다.",
       policy:"금융 서비스 인증 정책(본인인증/공동인증서/오픈뱅킹 API)별 예외 케이스 42가지를 정리하여 개발팀 공유. 투자 금액 한도, 계좌 유형별 연결 방식, KYC 정책을 법무팀과 협의 후 문서화했습니다.",
       uiux:"온보딩을 5단계로 재설계하고 각 단계에서 진행 상태를 시각적으로 표시. 오류 화면에 원인과 해결 방법을 함께 제공하는 '스마트 오류 안내' 패턴 신규 설계. 주요 화면 22개 Figma 설계서 작성 후 2회 내부 UT 진행."
     },
     results:{
       quantitative:["계좌 연결 완료율 46% → 78% (+70%)","첫 투자 완료율 23% → 41% (+78%)","CS 인증 관련 문의 −58%"],
       qualitative:["스마트 오류 안내 패턴이 내부 디자인 시스템 표준으로 채택","온보딩 설계 구조가 2개 신규 서비스에 공유·적용","법무팀 협의 기반 정책 문서가 이후 프로젝트 템플릿으로 활용"]
     },
     lesson:"금융 서비스에서는 오류 상태 설계가 핵심입니다. 정상 플로우 설계에 시간을 많이 썼지만 실제 이탈은 오류 케이스에서 발생했습니다. 이후 모든 금융 프로젝트에서 오류 케이스 설계를 별도 스프린트로 분리 진행하며, 법무·컴플라이언스 팀과의 조기 협의가 후반 설계 변경을 막는 핵심 습관임을 깨달았습니다."},
    {id:"p3",title:"커뮤니티 플랫폼 IA 전면 재설계",service:"소셜 커뮤니티 서비스 (더클림유니언)",
     category:"IA Design · Service Strategy",period:"2015.03 — 2016.09",
     contribution:"기획 기여도 100% · 기획 PM (총 5명)",
     role:["서비스 기획","IA 설계","UI/UX 화면설계서 작성","서비스 정책 수립"],
     images:["기존 IA 감사 — 메뉴 구조도 및 중복 항목 맵","카드 소팅 결과 — 사용자 멘탈모델 분석","신규 IA 구조도 — 사용자 태스크 중심 재편","주요 화면 와이어프레임 Before & After"],
     background:"5년간 기능이 누적되면서 메뉴 구조가 130개 항목 이상으로 비대해졌고, 사용자들이 핵심 기능을 찾지 못해 이탈하는 현상이 발생했습니다. 월 활성 사용자(MAU) 감소가 3개월 연속 이어지자 서비스 구조 전면 재검토가 필요했습니다.",
     problem:"20명의 실 사용자 카드 소팅 결과, 개발자 중심으로 만들어진 메뉴 분류와 사용자의 멘탈모델 사이에 큰 괴리가 있음을 확인했습니다. '콘텐츠 소비'와 '소셜 활동' 기능이 뒤섞여 있어 핵심 기능까지 평균 3.8단계를 거쳐야 했습니다.",
     process:{
       hypothesis:"IA를 사용자 태스크 중심으로 재편하고 핵심 기능까지의 뎁스를 최대 2단계로 제한하면, 핵심 기능 도달 시간이 50% 이상 단축될 것으로 가설을 수립했습니다.",
       policy:"130개 메뉴 항목을 6개 사용자 역할별로 매핑하여 중복 항목 28개를 통합·삭제. 콘텐츠 유형별 접근 권한(일반/프리미엄/운영자) 정책을 재정비하고, IA 변경이 기존 URL 구조에 미치는 영향을 SEO 관점에서 분석했습니다.",
       uiux:"3계층(홈 → 카테고리 → 상세) IA로 단순화. 상황별 사이드바, 퀵액세스 툴바, 전역 검색 신규 도입. 3가지 IA 프로토타입 제작 후 12명과 모더레이티드 UT 진행, 최종안 선정. 주요 화면 18개 설계서 작성."
     },
     results:{
       quantitative:["핵심 기능 도달 뎁스 3.8단계 → 1.9단계 (−50%)","MAU 3개월 연속 회복세 (+22%)","SUS 점수 54 → 79 (+46%)"],
       qualitative:["중복 메뉴 28개 통합 삭제, 구조 간소화","IA 거버넌스 프로세스 도입 (분기별 구조 검토)","신규 기능 추가 시 IA 영향도 사전 검토 문화 정착"]
     },
     lesson:"카드 소팅을 초기에 했어야 했습니다. 처음에는 시스템 아키텍처 기반 구조를 제안했다가 사용자 인터뷰에서 완전히 다른 멘탈모델이 드러나 설계를 처음부터 다시 했습니다. 데이터로 의사결정을 설득하는 경험이 큰 자산이 되었고, IA는 지속적인 거버넌스가 필요함을 깨달았습니다."},

<script type="text/babel">



const { useState, useEffect, useCallback, useLayoutEffect } = React;

/* ── Tokens ──────────────────────────────────────────────────── */
const ACC = '#6750A4';
const BRD = '#E8E7E4';
const T1 = '#111110';
const T2 = '#595856';
const T3 = '#ABABAB';
const SURF = '#F8F7F5';

/* ── FadeIn ──────────────────────────────────────────────────── */
const FadeIn = ({ children, delay = 0, style: sx = {} }) => {
  const [v, setV] = useState(false);
  useLayoutEffect(() => {if (delay === 0) {setV(true);return;}const t = setTimeout(() => setV(true), delay);return () => clearTimeout(t);}, []);
  return <div style={{ opacity: v ? 1 : 0, transform: v ? 'none' : 'translateY(18px)', transition: 'opacity .5s ease,transform .5s ease', ...sx }}>{children}</div>;
};

/* ── Overline label ──────────────────────────────────────────── */
const OL = ({ children, color }) =>
<p className="text-overline" style={{ color: color || T3, marginBottom: 12 }}>{children}</p>;


/* ── Image placeholder ───────────────────────────────────────── */
const ImgSlot = ({ label = '', index = 0 }) => {
  const surfs = ['#F0EFed', '#EDECEA', '#F2F1EF'];
  return (
    <div style={{ position: 'relative', width: '100%', paddingBottom: '56.25%', overflow: 'hidden', background: surfs[index % 3], border: `1px solid ${BRD}` }}>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, padding: 28 }}>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="2" stroke="#CDCCC9" strokeWidth="1.4" /><circle cx="9" cy="9" r="2.5" stroke="#CDCCC9" strokeWidth="1.4" /><polyline points="2 20 9 13 14 18 18 14 26 21" stroke="#CDCCC9" strokeWidth="1.4" fill="none" /></svg>
        <span className="text-caption" style={{ color: T3, textAlign: 'center', maxWidth: 280, lineHeight: 1.6 }}>{label}</span>
      </div>
    </div>);

};

/* ── Image Carousel ──────────────────────────────────────────── */
const Carousel = ({ images }) => {
  const [cur, setCur] = useState(0);
  if (!images || !images.length) return null;
  const go = (d) => setCur((c) => (c + d + images.length) % images.length);
  return (
    <div>
      <div style={{ position: 'relative', overflow: 'hidden' }}>
        {images.map((img, i) => <div key={i} style={{ display: i === cur ? 'block' : 'none' }}><ImgSlot label={img} index={i} /></div>)}
      </div>
      {images.length > 1 &&
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 16 }}>
          <button onClick={() => go(-1)} style={{ width: 40, height: 40, border: `1px solid ${BRD}`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: T2, transition: 'all .15s', fontSize: 16 }}
        onMouseEnter={(e) => {e.currentTarget.style.borderColor = T2;e.currentTarget.style.color = T1;}} onMouseLeave={(e) => {e.currentTarget.style.borderColor = BRD;e.currentTarget.style.color = T2;}}>←</button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <span className="text-caption" style={{ color: T3 }}>{String(cur + 1).padStart(2, '0')} / {String(images.length).padStart(2, '0')}</span>
            <div style={{ display: 'flex', gap: 5 }}>
              {images.map((_, i) => <button key={i} onClick={() => setCur(i)} style={{ height: 2, width: i === cur ? 22 : 7, background: i === cur ? T1 : BRD, transition: 'all .22s', border: 'none', cursor: 'pointer', borderRadius: 1 }} />)}
            </div>
          </div>
          <button onClick={() => go(1)} style={{ width: 40, height: 40, border: `1px solid ${BRD}`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: T2, transition: 'all .15s', fontSize: 16 }}
        onMouseEnter={(e) => {e.currentTarget.style.borderColor = T2;e.currentTarget.style.color = T1;}} onMouseLeave={(e) => {e.currentTarget.style.borderColor = BRD;e.currentTarget.style.color = T2;}}>→</button>
        </div>
      }
    </div>);

};

/* ── Nav ─────────────────────────────────────────────────────── */
const Nav = ({ page, go }) => {
  const [sc, setSc] = useState(false);
  const [mob, setMob] = useState(false);
  const { logo } = window.APP;
  useEffect(() => {const h = () => setSc(window.scrollY > 20);window.addEventListener('scroll', h, { passive: true });return () => window.removeEventListener('scroll', h);}, []);
  const items = [{ id: 'about', label: 'About' }, { id: 'career', label: 'Career' }, { id: 'portfolio', label: 'Portfolio' }, { id: 'experience', label: 'Experience' }];
  const active = page === 'detail' ? 'portfolio' : page;
  const navGo = (id) => {go(id);setMob(false);};
  return (
    <nav style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, background: 'rgba(255,255,255,.97)', backdropFilter: 'blur(16px)', borderBottom: `1px solid ${sc || mob ? BRD : 'transparent'}`, transition: 'border-color .3s' }}>
      <div className="page-wrap" style={{ height: 64, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button onClick={() => navGo('about')} style={{ display: 'flex', alignItems: 'center', flexShrink: 0 }}>
          {logo ?
          <img src={logo} alt="logo" style={{ height: 32, objectFit: 'contain', display: 'block' }} /> :
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 5 }}>
            <div style={{ ...{ display: 'flex', alignItems: 'center', border: `1.5px solid ${T1}`, borderRadius: 99, overflow: 'hidden', whiteSpace: 'nowrap' }, border: "1.5px solid rgb(214, 198, 230)" }}>
              <span style={{ padding: '5px 11px', fontSize: 13, fontWeight: 600, color: T1, letterSpacing: '-.01em' }}>Park Yongjoon</span>
              <span style={{ padding: '5px 10px', fontSize: 13, fontWeight: 700, background: ACC, color: '#fff' }}>JD</span>
            </div>
            <span style={{ fontSize: 9.5, color: T3, fontWeight: 500, letterSpacing: '.04em', whiteSpace: 'nowrap' }}>서비스 UX/UI 기획자 · PM/PO</span>
          </div>
          }
        </button>
        {/* Desktop nav */}
        <div className="nav-links" style={{ display: 'flex', gap: 28, alignItems: 'center' }}>
          {items.map((it) => {const on = active === it.id;return (
              <button key={it.id} onClick={() => navGo(it.id)} className="text-body-2-500"

          <div style={{ borderTop: `1px solid ${BRD}`, marginTop: 0, paddingTop: 48, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <button onClick={onBack} className="text-body-2" style={{ color: T3, transition: 'color .15s' }}
            onMouseEnter={(e) => e.currentTarget.style.color = T1} onMouseLeave={(e) => e.currentTarget.style.color = T3}>← All Projects</button>
            {next && <button onClick={() => go('detail', next.id)} style={{ textAlign: 'right' }}>
              <OL>Next Project</OL>
              <p className="text-h6" style={{ color: T2, transition: 'color .15s' }} onMouseEnter={(e) => e.currentTarget.style.color = T1} onMouseLeave={(e) => e.currentTarget.style.color = T2}>{next.title} →</p>
            </button>}
          </div>
        </FadeIn>
      </div>
    </div>);

};

/* ════════════════════ EXPERIENCE PAGE ══════════════════════════ */
const ExperiencePage = () => {
  const { career } = window.APP;
  const needsScroll = career.length > 5;
  return (
    <div style={{ paddingTop: 64 }}>
      <div className="page-wrap mob-section" style={{ padding: '80px 48px' }}>
        <FadeIn>
          <OL color={ACC}>Experience</OL>
          <h1 className="text-h3" style={{ color: T1, marginBottom: 56 }}>Work History</h1>
        </FadeIn>
        <div className={needsScroll ? 'scroll-hidden' : ''} style={needsScroll ? { maxHeight: 1320, overflowY: 'auto' } : {}}>
          {career.map((item, idx) =>
          <FadeIn key={item.id} delay={idx * 60}>
              <div style={{ borderTop: `1px solid ${BRD}`, padding: '48px 0' }}>
                <div className="grid-2" style={{ display: 'grid', gridTemplateColumns: '220px 1fr', gap: '36px' }}>
                  <div>
                    <p className="text-body-1-500" style={{ color: ACC, marginBottom: 8 }}>{item.period}</p>
                    <p className="text-mini-upper" style={{ color: T3 }}>{item.category}</p>
                  </div>
                  <div>
                    <h3 className="text-h4" style={{ color: T1, marginBottom: 4 }}>{item.company}</h3>
                    <p className="text-body-2" style={{ color: T3, marginBottom: 28 }}>{item.dept} · {item.role}</p>
                    <ul style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                      {item.bullets.map((b, i) => <li key={i} className="text-body-1" style={{ color: T2, paddingLeft: 20, position: 'relative', lineHeight: '26px' }}><span style={{ position: 'absolute', left: 0, color: T3 }}>—</span>{b}</li>)}
                    </ul>
                  </div>
                </div>
              </div>
            </FadeIn>
          )}
          <div style={{ borderTop: `1px solid ${BRD}` }} />
        </div>
      </div>
    </div>);

};

/* ══════════════════════ CONTACT PAGE ═══════════════════════════ */
const ContactPage = () => {
  const { email, phone } = window.APP;
  const [form, setForm] = useState({ name: '', email: '', message: '' });
  const [errs, setErrs] = useState({});
  const [sent, setSent] = useState(false);
  const validate = () => {const e = {};if (!form.name.trim()) e.name = '이름을 입력해주세요';if (!/\S+@\S+\.\S+/.test(form.email)) e.email = '올바른 이메일을 입력해주세요';if (form.message.trim().length < 10) e.message = '메시지를 입력해주세요';return e;};
  const submit = (ev) => {ev.preventDefault();const e = validate();if (Object.keys(e).length) {setErrs(e);return;}setSent(true);};
  const fld = (id, lbl, type = 'text', ph = '') => {const err = !!errs[id];return (
      <div key={id}>
      <label className="text-overline" style={{ display: 'block', marginBottom: 10, color: err ? '#C0392B' : T3 }}>{err ? errs[id] : lbl}</label>
      <input type={type} placeholder={ph} value={form[id]} onChange={(e) => {setForm((f) => ({ ...f, [id]: e.target.value }));setErrs((er) => ({ ...er, [id]: '' }));}}
        className="text-input-text" style={{ width: '100%', background: 'transparent', border: 'none', borderBottom: `1.5px solid ${err ? '#C0392B' : BRD}`, color: T1, padding: '10px 0', outline: 'none', fontFamily: 'inherit', transition: 'border-color .15s' }}
        onFocus={(e) => e.target.style.borderBottomColor = T2} onBlur={(e) => e.target.style.borderBottomColor = err ? '#C0392B' : BRD} />
    </div>);
  };
  return (
    <div style={{ paddingTop: 64 }}>
      <div className="page-wrap mob-section" style={{ padding: '80px 48px' }}>
        <FadeIn>
          <OL color={ACC}>Contact</OL>
          <h1 className="text-h3" style={{ color: T1, marginBottom: 56 }}>Get in Touch</h1>
        </FadeIn>
        <div className="grid-2 contact-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '80px', alignItems: 'start' }}>
          <FadeIn>
            <p className="text-h5" style={{ color: T2, fontWeight: 300, lineHeight: '32px', maxWidth: 340, marginBottom: 52 }}>새로운 프로젝트나 협업 기회에 대해 언제든지 연락 주세요. 함께 좋은 서비스를 만들어갈 기회를 기다리고 있습니다.</p>
            {[{ l: 'Email', v: email, h: `mailto:${email}` }, { l: 'Phone', v: phone, h: `tel:${phone.replace(/\D/g, '')}` }].map(({ l, v, h }) =>
            <div key={l} style={{ marginBottom: 28 }}>
                <p className="text-overline" style={{ color: T3, marginBottom: 6 }}>{l}</p>
                <a href={h} className="text-body-1" style={{ color: T2, transition: 'color .15s' }} onMouseEnter={(e) => e.currentTarget.style.color = T1} onMouseLeave={(e) => e.currentTarget.style.color = T2}>{v}</a>
              </div>
            )}
          </FadeIn>
          <FadeIn delay={80}>
            {sent ?
            <div style={{ paddingTop: 8 }}>
                <div style={{ width: 44, height: 44, border: `1.5px solid ${BRD}`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 24, borderRadius: 2 }}>
                  <span style={{ color: ACC, fontSize: 20 }}>✓</span>
                </div>
                <h3 className="text-h4" style={{ color: T1, marginBottom: 12 }}>메시지가 전송되었습니다</h3>
                <p className="text-body-1" style={{ color: T2, lineHeight: '28px' }}>감사합니다. 빠른 시일 내에 연락드리겠습니다.</p>
                <button onClick={() => {setSent(false);setForm({ name: '', email: '', message: '' });}} className="text-body-2" style={{ marginTop: 28, color: T3, transition: 'color .15s' }} onMouseEnter={(e) => e.currentTarget.style.color = T1} onMouseLeave={(e) => e.currentTarget.style.color = T3}>다시 작성하기 →</button>
              </div> :

            <form onSubmit={submit} noValidate style={{ display: 'flex', flexDirection: 'column', gap: 36 }}>
                {fld('name', '이름', 'text', '성함')}
                {fld('email', '이메일', 'email', 'your@email.com')}
                <div>
                  <label className="text-overline" style={{ display: 'block', marginBottom: 10, color: errs.message ? '#C0392B' : T3 }}>{errs.message || '메시지'}</label>
                  <textarea rows={5} placeholder="프로젝트나 협업에 대해 알려주세요..." value={form.message}
                onChange={(e) => {setForm((f) => ({ ...f, message: e.target.value }));setErrs((er) => ({ ...er, message: '' }));}}
                className="text-input-text" style={{ width: '100%', background: 'transparent', border: 'none', borderBottom: `1.5px solid ${errs.message ? '#C0392B' : BRD}`, color: T1, padding: '10px 0', outline: 'none', fontFamily: 'inherit', resize: 'none', transition: 'border-color .15s' }}
                onFocus={(e) => e.target.style.borderBottomColor = T2} onBlur={(e) => e.target.style.borderBottomColor = errs.message ? '#C0392B' : BRD} />
                </div>
                <button type="submit" className="text-btn-medium"
              style={{ alignSelf: 'flex-start', color: '#fff', background: T1, border: `1.5px solid ${T1}`, padding: '12px 32px', transition: 'all .2s' }}
              onMouseEnter={(e) => {e.currentTarget.style.background = '#333';e.currentTarget.style.borderColor = '#333';}}
              onMouseLeave={(e) => {e.currentTarget.style.background = T1;e.currentTarget.style.borderColor = T1;}}>Send Message</button>
              </form>
            }
          </FadeIn>
        </div>
      </div>
    </div>);

};

/* ════════════════════════ APP ══════════════════════════════════ */
const App = () => {
  const getSaved = () => {try {return JSON.parse(localStorage.getItem('pyj_nav') || '{}');} catch {return {};}};
  const saved = getSaved();
  const [page, setPage] = useState(saved.page || 'about');
  const [pid, setPid] = useState(saved.pid || null);
  const [fading, setFading] = useState(false);
  const go = useCallback((np, npid = null) => {
    setFading(true);
    setTimeout(() => {setPage(np);setPid(npid);try {localStorage.setItem('pyj_nav', JSON.stringify({ page: np, pid: npid }));} catch {}window.scrollTo({ top: 0, behavior: 'instant' });setFading(false);}, 160);
  }, []);
  const renderPage = () => {
    if (page === 'detail' && pid) return <DetailPage projectId={pid} onBack={() => go('portfolio')} go={go} />;
    if (page === 'career') return <CareerPage />;
    if (page === 'portfolio') return <PortfolioPage onDetail={(id) => go('detail', id)} />;
    if (page === 'experience') return <ExperiencePage />;
    if (page === 'contact') return <ContactPage />;
    return <AboutPage go={go} />;
  };
  return (
    <div>
      <Nav page={page} go={go} />
      <main key={page + (pid || '')} style={{ minHeight: '100vh', opacity: fading ? 0 : 1, transform: fading ? 'translateY(8px)' : 'translateY(0)', transition: 'opacity .15s ease,transform .15s ease' }}>
        {renderPage()}
      </main>
      <footer style={{ borderTop: `1px solid ${BRD}`, background: SURF }}>
        <div className="footer-row page-wrap" style={{ padding: '32px 48px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <p className="text-caption" style={{ color: T3 }}>박용준 · {new Date().getFullYear()}</p>
          <p className="text-caption" style={{ color: T3 }}>서비스 UX/UI 기획자 · PM/PO</p>
        </div>
      </footer>
    </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
