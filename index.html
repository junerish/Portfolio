<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Component</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── tokens ── */
:root{
  --color-primitive-primary-500:#5578F0;--color-primitive-primary-600:#4D6CD8;--color-primitive-primary-100:#DDE4FC;
  --color-primitive-success-100:#D4F4E2;--color-primitive-success-500:#28C76F;--color-primitive-success-600:#24B364;
  --color-primitive-warning-100:#FFECD9;--color-primitive-warning-500:#FF9F43;
  --color-primitive-error-100:#FFDBDC;--color-primitive-error-500:#FF4C51;
  --color-primitive-info-100:#CCF1F6;--color-primitive-info-500:#00BAD1;
  --color-primitive-gray-100:#EAEAEC;--color-primitive-gray-200:#D5D4D8;
  --color-primitive-opacity-primary-8:#5578F014;--color-primitive-opacity-primary-16:#5578F029;
  --color-color-palette-primary-main:#5578F0;--color-color-palette-primary-dark:#4D6CD8;
  --color-color-palette-primary-opacity-lighter:#5578F014;--color-color-palette-primary-opacity-light:#5578F029;
  --color-color-palette-success-main:#28C76F;--color-color-palette-success-dark:#24B364;
  --color-color-palette-warning-main:#FF9F43;--color-color-palette-error-main:#FF4C51;--color-color-palette-info-main:#00BAD1;
  --color-theme-text-primary:#2F2B3DE6;--color-theme-text-secondary:#2F2B3DB3;
  --color-theme-text-subtitle:#2F2B3D8C;--color-theme-text-disabled:#2F2B3D66;
  --color-theme-action-hover:#2F2B3D0F;--color-theme-action-selected:#2F2B3D14;
  --color-theme-divider:#2F2B3D1F;--color-theme-outline-border:#2F2B3D3D;
  --color-theme-input-border:#2F2B3D38;--color-theme-chip-background:#2F2B3D14;
  --color-misc-body-bg:#F7F7F7;--color-misc-paper:#FFFFFF;--color-misc-table-header:#FFFFFF;
  --shadow-elevation-gray-shadow-xs:0px 1px 6px 0px rgba(47,43,61,.10);
  --shadow-elevation-gray-shadow-sm:0px 2px 8px 0px rgba(47,43,61,.12);
  --shadow-elevation-primary-primary-shadow-sm:0px 2px 6px 0px rgba(85,120,240,.30);
  --spacing-p-1:4px;--spacing-p-2:8px;--spacing-p-3:12px;--spacing-p-4:16px;--spacing-p-5:20px;--spacing-p-6:24px;
  --spacing-gap-1:4px;--spacing-gap-2:8px;--spacing-gap-3:12px;--spacing-gap-4:16px;
  --radius-sm:4px;--radius-md:6px;--radius-lg:8px;--radius-xl:10px;--radius-border-round:500px;
}

/* ── typography ── */
.text-h5{font-size:18px;font-family:"Public Sans";font-weight:500;line-height:28px;}
.text-h6{font-size:15px;font-family:"Public Sans";font-weight:500;line-height:22px;}
.text-body-1{font-size:15px;font-family:"Public Sans";font-weight:400;line-height:22px;}
.text-body-2{font-size:13px;font-family:"Public Sans";font-weight:400;line-height:20px;}
.text-body-2-500{font-size:13px;font-family:"Public Sans";font-weight:500;line-height:20px;}
.text-caption{font-size:13px;font-family:"Public Sans";font-weight:400;line-height:18px;letter-spacing:.4px;}
.text-small{font-size:12px;font-family:"Public Sans";font-weight:400;}
.text-overline{font-size:12px;font-family:"Public Sans";font-weight:400;line-height:14px;letter-spacing:.8px;text-transform:uppercase;}
.text-chip{font-size:13px;font-family:"Public Sans";font-weight:500;line-height:20px;}
.text-btn-small{font-size:13px;font-family:"Public Sans";font-weight:500;line-height:18px;}
.text-table-header{font-size:13px;font-family:"Public Sans";font-weight:500;line-height:24px;letter-spacing:.2px;text-transform:uppercase;}
.text-input-text{font-size:15px;font-family:"Public Sans";font-weight:400;line-height:24px;}

/* ── reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Public Sans",sans-serif;background:var(--color-misc-body-bg);color:var(--color-theme-text-primary);padding:32px;}

/* ── chip ── */
.chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--radius-border-round);}
.chip-success{background:var(--color-primitive-success-100);color:var(--color-color-palette-success-dark);}
.chip-warning{background:var(--color-primitive-warning-100);color:var(--color-color-palette-warning-main);}
.chip-error{background:var(--color-primitive-error-100);color:var(--color-color-palette-error-main);}
.chip-info{background:var(--color-primitive-info-100);color:var(--color-color-palette-info-main);}
.chip-gray{background:var(--color-theme-chip-background);color:var(--color-theme-text-secondary);}
.chip-primary{background:var(--color-color-palette-primary-opacity-lighter);color:var(--color-color-palette-primary-main);}

/* ── table wrap ── */
.table-card{
  background:var(--color-misc-paper);border-radius:var(--radius-xl);
  border:1px solid var(--color-theme-divider);box-shadow:var(--shadow-elevation-gray-shadow-xs);
  overflow:hidden;
}

/* ── toolbar ── */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--spacing-gap-3);
  padding:var(--spacing-p-5) var(--spacing-p-6);
  border-bottom:1px solid var(--color-theme-divider);
}
.toolbar-left{display:flex;align-items:center;gap:var(--spacing-gap-3);}
.toolbar-title{color:var(--color-theme-text-primary);}
.row-count{color:var(--color-theme-text-subtitle);}

/* search */
.search-wrap{position:relative;display:flex;align-items:center;}
.search-icon{position:absolute;left:10px;color:var(--color-theme-text-subtitle);pointer-events:none;font-size:.9rem;}
.search-input{
  padding:var(--spacing-p-2) var(--spacing-p-4) var(--spacing-p-2) 32px;
  border:1.5px solid var(--color-theme-input-border);border-radius:var(--radius-lg);
  background:var(--color-misc-paper);color:var(--color-theme-text-primary);
  outline:none;transition:border-color .2s;width:220px;
  font-family:"Public Sans",sans-serif;font-size:14px;
}
.search-input:focus{border-color:var(--color-color-palette-primary-main);}
.search-input::placeholder{color:var(--color-theme-text-disabled);}

/* filter select */
.filter-select{
  padding:var(--spacing-p-2) var(--spacing-p-4);
  border:1.5px solid var(--color-theme-input-border);border-radius:var(--radius-lg);
  background:var(--color-misc-paper);color:var(--color-theme-text-primary);
  outline:none;cursor:pointer;font-family:"Public Sans",sans-serif;font-size:13px;
  transition:border-color .2s;
}
.filter-select:focus{border-color:var(--color-color-palette-primary-main);}

/* ── table ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead{background:var(--color-misc-table-header);}
th{
  padding:var(--spacing-p-3) var(--spacing-p-5);
  text-align:left;color:var(--color-theme-text-subtitle);
  border-bottom:1px solid var(--color-theme-divider);
  white-space:nowrap;user-select:none;
}
th.sortable{cursor:pointer;}
th.sortable:hover{color:var(--color-color-palette-primary-main);background:var(--color-theme-action-hover);}
th.sort-asc,th.sort-desc{color:var(--color-color-palette-primary-main);}
.sort-icon{margin-left:4px;font-size:.75rem;display:inline-block;transition:transform .15s;}
th.sort-desc .sort-icon{transform:rotate(180deg);}

td{
  padding:var(--spacing-p-3) var(--spacing-p-5);
  color:var(--color-theme-text-primary);
  border-bottom:1px solid var(--color-theme-divider);
  vertical-align:middle;
}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover{background:var(--color-theme-action-hover);}
tbody tr.selected{background:var(--color-color-palette-primary-opacity-lighter);}

/* avatar */
.avatar-cell{display:flex;align-items:center;gap:var(--spacing-gap-3);}
.avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;
  color:var(--color-misc-paper);
}
.avatar-name{color:var(--color-theme-text-primary);}
.avatar-email{color:var(--color-theme-text-subtitle);}

/* checkbox */
.cb{width:16px;height:16px;cursor:pointer;accent-color:var(--color-color-palette-primary-main);}

/* action btn */
.act-btn{
  background:none;border:none;cursor:pointer;padding:var(--spacing-p-1) var(--spacing-p-2);
  border-radius:var(--radius-md);color:var(--color-theme-text-subtitle);font-size:.85rem;
  transition:all .15s;
}
.act-btn:hover{background:var(--color-theme-action-hover);color:var(--color-color-palette-primary-main);}

/* empty */
.empty{padding:48px 0;text-align:center;color:var(--color-theme-text-subtitle);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}

/* ── pagination ── */
.pagination{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  padding:var(--spacing-p-4) var(--spacing-p-6);
  border-top:1px solid var(--color-theme-divider);
}
.page-info{color:var(--color-theme-text-subtitle);}
.page-btns{display:flex;align-items:center;gap:var(--spacing-gap-1);}
.page-btn{
  min-width:32px;height:32px;padding:0 var(--spacing-p-2);
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-md);border:1px solid var(--color-theme-outline-border);
  background:var(--color-misc-paper);cursor:pointer;transition:all .15s;
  color:var(--color-theme-text-secondary);
}
.page-btn:hover:not(:disabled){background:var(--color-theme-action-hover);border-color:var(--color-color-palette-primary-main);color:var(--color-color-palette-primary-main);}
.page-btn.active{background:var(--color-color-palette-primary-main);border-color:var(--color-color-palette-primary-main);color:#fff;font-weight:600;}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}
.per-page-wrap{display:flex;align-items:center;gap:8px;color:var(--color-theme-text-subtitle);}
</style>
</head>
<body>

<div class="table-card">
  <!-- toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <p class="text-h6 toolbar-title">팀원 목록</p>
      <span class="text-caption row-count" id="rowCount"></span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input text-body-2" id="searchInput" placeholder="이름 또는 이메일 검색..." oninput="render()">
      </div>
      <select class="filter-select text-body-2" id="deptFilter" onchange="render()">
        <option value="">전체 부서</option>
        <option>디자인팀</option>
        <option>개발팀</option>
        <option>기획팀</option>
        <option>마케팅팀</option>
        <option>HR팀</option>
      </select>
      <select class="filter-select text-body-2" id="statusFilter" onchange="render()">
        <option value="">전체 상태</option>
        <option>정상</option>
        <option>휴가</option>
        <option>출장</option>
        <option>퇴사</option>
      </select>
    </div>
  </div>

  <!-- table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:40px;"><input class="cb" type="checkbox" id="chkAll" onchange="toggleAll(this)"></th>
          <th class="text-table-header sortable" data-col="name" onclick="sort('name')">이름 <span class="sort-icon">▲</span></th>
          <th class="text-table-header sortable" data-col="dept" onclick="sort('dept')">부서 <span class="sort-icon">▲</span></th>
          <th class="text-table-header sortable" data-col="role" onclick="sort('role')">직급 <span class="sort-icon">▲</span></th>
          <th class="text-table-header sortable" data-col="status" onclick="sort('status')">상태 <span class="sort-icon">▲</span></th>
          <th class="text-table-header sortable" data-col="joined" onclick="sort('joined')">입사일 <span class="sort-icon">▲</span></th>
          <th class="text-table-header" style="width:80px;">액션</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">
      <div class="empty-icon">🔍</div>
      <p class="text-body-1-500" style="color:var(--color-theme-text-primary);margin-bottom:4px;">검색 결과가 없습니다</p>
      <p class="text-caption">다른 키워드나 필터를 시도해 보세요.</p>
    </div>
  </div>

  <!-- pagination -->
  <div class="pagination">
    <div class="per-page-wrap">
      <span class="text-caption">페이지당 행:</span>
      <select class="filter-select text-body-2" id="perPage" onchange="curPage=1;render()">
        <option>5</option><option selected>10</option><option>20</option><option>50</option>
      </select>
    </div>
    <span class="text-caption page-info" id="pageInfo"></span>
    <div class="page-btns" id="pageBtns"></div>
  </div>
</div>

<script>
const COLORS = ['#5578F0','#28C76F','#FF9F43','#FF4C51','#00BAD1','#808390','#4D6CD8','#24B364'];
const STATUS_MAP = {정상:'chip-success',휴가:'chip-info',출장:'chip-warning',퇴사:'chip-error'};

const RAW = [
  {name:'김민지',email:'minji@co.kr',dept:'디자인팀',role:'팀장',status:'정상',joined:'2020-03-02'},
  {name:'이준호',email:'junho@co.kr',dept:'개발팀',role:'시니어',status:'정상',joined:'2019-07-15'},
  {name:'박서연',email:'seoyeon@co.kr',dept:'기획팀',role:'매니저',status:'휴가',joined:'2021-01-10'},
  {name:'최현우',email:'hyunwoo@co.kr',dept:'마케팅팀',role:'주니어',status:'출장',joined:'2022-05-23'},
  {name:'정다은',email:'daeun@co.kr',dept:'HR팀',role:'팀장',status:'정상',joined:'2018-11-30'},
  {name:'한지수',email:'jisu@co.kr',dept:'개발팀',role:'주니어',status:'정상',joined:'2023-02-14'},
  {name:'오민석',email:'minseok@co.kr',dept:'디자인팀',role:'시니어',status:'정상',joined:'2020-08-01'},
  {name:'강예진',email:'yejin@co.kr',dept:'기획팀',role:'주니어',status:'휴가',joined:'2023-06-19'},
  {name:'윤태양',email:'taeyang@co.kr',dept:'개발팀',role:'팀장',status:'정상',joined:'2017-04-05'},
  {name:'신하은',email:'haeun@co.kr',dept:'마케팅팀',role:'매니저',status:'출장',joined:'2021-09-12'},
  {name:'임재원',email:'jaewon@co.kr',dept:'개발팀',role:'시니어',status:'정상',joined:'2019-12-03'},
  {name:'배수진',email:'sujin@co.kr',dept:'HR팀',role:'주니어',status:'정상',joined:'2022-10-28'},
  {name:'노준혁',email:'junhyuk@co.kr',dept:'기획팀',role:'시니어',status:'퇴사',joined:'2018-06-17'},
  {name:'홍예나',email:'yena@co.kr',dept:'디자인팀',role:'주니어',status:'정상',joined:'2024-01-08'},
  {name:'문성민',email:'sungmin@co.kr',dept:'개발팀',role:'주니어',status:'정상',joined:'2024-03-25'},
  {name:'고지현',email:'jihyun@co.kr',dept:'마케팅팀',role:'팀장',status:'정상',joined:'2016-09-01'},
  {name:'서태준',email:'taejun@co.kr',dept:'기획팀',role:'매니저',status:'휴가',joined:'2020-04-14'},
  {name:'류민아',email:'mina@co.kr',dept:'디자인팀',role:'매니저',status:'정상',joined:'2021-07-22'},
];

let sortCol='name', sortDir=1, curPage=1, selected=new Set();

function avatarColor(name){ return COLORS[name.charCodeAt(0)%COLORS.length]; }
function initials(name){ return name.slice(0,1); }

function filtered(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const dept = document.getElementById('deptFilter').value;
  const st = document.getElementById('statusFilter').value;
  return RAW.filter(r=>{
    const matchQ = !q || r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q);
    const matchD = !dept || r.dept===dept;
    const matchS = !st || r.status===st;
    return matchQ && matchD && matchS;
  }).sort((a,b)=>{
    let va=a[sortCol], vb=b[sortCol];
    return sortDir*(va<vb?-1:va>vb?1:0);
  });
}

function sort(col){
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
  document.querySelectorAll('th[data-col]').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col===col) th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  });
  curPage=1; render();
}

function toggleAll(cb){
  const rows = filtered();
  const perPage = +document.getElementById('perPage').value;
  const start=(curPage-1)*perPage, page=rows.slice(start,start+perPage);
  page.forEach(r=> cb.checked ? selected.add(r.email) : selected.delete(r.email));
  render();
}

function toggleRow(email){ selected.has(email)?selected.delete(email):selected.add(email); render(); }

function render(){
  const rows = filtered();
  const perPage = +document.getElementById('perPage').value;
  const total = rows.length, pages = Math.max(1,Math.ceil(total/perPage));
  if(curPage>pages) curPage=pages;
  const start=(curPage-1)*perPage;
  const page = rows.slice(start, start+perPage);

  document.getElementById('rowCount').textContent = `${total}명`;
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  if(!page.length){tbody.innerHTML='';empty.style.display='block';} 
  else {
    empty.style.display='none';
    tbody.innerHTML = page.map(r=>`
      <tr class="${selected.has(r.email)?'selected':''}" onclick="toggleRow('${r.email}')">
        <td onclick="event.stopPropagation()"><input class="cb" type="checkbox" ${selected.has(r.email)?'checked':''} onchange="toggleRow('${r.email}')"></td>
        <td>
          <div class="avatar-cell">
            <div class="avatar" style="background:${avatarColor(r.name)}">${initials(r.name)}</div>
            <div><p class="text-body-2-500 avatar-name">${r.name}</p><p class="text-small avatar-email">${r.email}</p></div>
          </div>
        </td>
        <td class="text-body-2">${r.dept}</td>
        <td class="text-body-2">${r.role}</td>
        <td><span class="chip text-chip ${STATUS_MAP[r.status]||'chip-gray'}">${r.status}</span></td>
        <td class="text-body-2" style="color:var(--color-theme-text-secondary)">${r.joined}</td>
        <td>
          <button class="act-btn" title="수정" onclick="event.stopPropagation()">✏️</button>
          <button class="act-btn" title="삭제" onclick="event.stopPropagation()">🗑️</button>
        </td>
      </tr>`).join('');
  }

  // page info
  const s=total?start+1:0, e=Math.min(start+perPage,total);
  document.getElementById('pageInfo').textContent = `${s}–${e} / 전체 ${total}명`;

  // page buttons
  const btns = document.getElementById('pageBtns');
  let html = `<button class="page-btn text-btn-small" onclick="go(${curPage-1})" ${curPage<=1?'disabled':''}>‹</button>`;
  for(let i=1;i<=pages;i++){
    if(pages<=7||i===1||i===pages||Math.abs(i-curPage)<=1)
      html+=`<button class="page-btn text-btn-small${i===curPage?' active':''}" onclick="go(${i})">${i}</button>`;
    else if(Math.abs(i-curPage)===2)
      html+=`<span class="text-caption" style="padding:0 2px;color:var(--color-theme-text-subtitle)">…</span>`;
  }
  html+=`<button class="page-btn text-btn-small" onclick="go(${curPage+1})" ${curPage>=pages?'disabled':''}>›</button>`;
  btns.innerHTML=html;

  // all-check state
  const allCb = document.getElementById('chkAll');
  const pageEmails = page.map(r=>r.email);
  allCb.checked = pageEmails.length>0 && pageEmails.every(e=>selected.has(e));
  allCb.indeterminate = !allCb.checked && pageEmails.some(e=>selected.has(e));
}

function go(p){ curPage=p; render(); }

render();
</script>
</body>
</html>
